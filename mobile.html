<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>C1 생산 현황 (모바일)</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #ffffff;
    --bg-panel: #f0f2f5;
    --bg-card: #ffffff;
    --bg-card2: #f5f6f9;
    --border: #b8c2d0;
    --border-bright: #8a97aa;
    --accent: #0099cc;
    --accent2: #0077aa;
    --accent-dim: rgba(0,153,204,0.13);
    --green: #00aa55;
    --green-dim: rgba(0,170,85,0.13);
    --yellow: #cc8800;
    --yellow-dim: rgba(204,136,0,0.10);
    --red: #dd1133;
    --red-dim: rgba(221,17,51,0.13);
    --pink: #ff3d7a;
    --text-primary: #0d1821;
    --text-secondary: #1e2e45;
    --text-dim: #5b6b7d;
    --font-mono: 'Share Tech Mono', monospace;
    --font-main: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg-panel); color:var(--text-primary); font-family:var(--font-main); }
  body { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }

  /* ── 상단 고정바 */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--text-primary);
    padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar-left { display:flex; align-items:center; gap:8px; }
  .topbar-title { font-family:var(--font-main); font-weight:900; font-size:16px; color:#fff; letter-spacing:.2px; }
  .topbar-title .ver { font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--accent); border:1px solid var(--accent2); border-radius:3px; padding:1px 5px; margin-left:6px; vertical-align:middle; }
  .topbar-logo { background:#fff; border-radius:6px; padding:4px 6px; display:flex; align-items:center; }
  .topbar-logo img { height:16px; display:block; }
  .topbar-sub { font-family:var(--font-mono); font-size:10px; color:#8fb8cc; margin-top:1px; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 0 rgba(0,170,85,.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(0,170,85,.5);} 70%{box-shadow:0 0 0 7px rgba(0,170,85,0);} 100%{box-shadow:0 0 0 0 rgba(0,170,85,0);} }
  .refresh-btn { background:rgba(255,255,255,.1); border:none; color:#fff; font-size:15px; padding:7px 9px; border-radius:8px; }
  .refresh-btn:active { background:rgba(255,255,255,.22); }
  .refresh-btn.spin svg { animation: spin .7s linear; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  /* ── 세그먼트 필터 (현황 탭 전용) */
  .segbar { display:flex; gap:6px; padding:10px 16px 4px; background:var(--bg-panel); position:sticky; top:calc(46px + env(safe-area-inset-top)); z-index:19; }
  .seg-btn {
    flex:1; text-align:center; padding:9px 0; border-radius:10px; border:1.5px solid var(--border);
    background:var(--bg-card); color:var(--text-dim); font-family:var(--font-main); font-weight:700; font-size:13px;
  }
  .seg-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* ── 공지판 (접이식) */
  .notice-wrap { margin:10px 16px 4px; }
  .notice-toggle {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; font-size:13px; font-weight:700; color:var(--text-secondary);
  }
  .notice-toggle .chev { transition: transform .2s; color:var(--text-dim); }
  .notice-toggle.open .chev { transform: rotate(180deg); }
  .notice-body { display:none; background:var(--bg-card); border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; padding:12px 14px; margin-top:-1px; }
  .notice-body.open { display:block; }
  .notice-item { font-size:13px; color:var(--text-secondary); line-height:1.55; margin-bottom:10px; }
  .notice-item:last-child { margin-bottom:0; }
  .notice-item .lbl { font-size:11px; font-weight:700; color:var(--text-dim); display:block; margin-bottom:3px; }

  /* ── 요약바 */
  .summary-row { display:flex; gap:8px; margin:12px 16px; }
  .summary-chip { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:9px 4px; text-align:center; }
  .summary-chip .n { font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--text-primary); white-space:nowrap; }
  .summary-chip .n small { font-size:10px; font-weight:500; }
  .summary-chip .l { font-size:10px; color:var(--text-dim); margin-top:1px; }
  .summary-chip .pct { font-family:var(--font-mono); font-size:11px; font-weight:700; margin-top:2px; }

  /* ── 모델 카드 */
  .section-label { font-size:12px; font-weight:700; color:var(--text-dim); margin:16px 16px 6px; letter-spacing:.3px; }
  .cards { padding: 0 16px; display:flex; flex-direction:column; gap:10px; }
  .mcard { background:var(--bg-card); border:1px solid var(--border); border-left:4px solid var(--border-bright); border-radius:12px; padding:14px 15px; position:relative; }
  .mcard-note-badge {
    position:absolute; top:-8px; right:-8px; background:var(--red); color:#fff; font-size:11px; font-weight:700;
    border-radius:10px; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0 5px;
    box-shadow:0 1px 3px rgba(0,0,0,.25); z-index:2;
  }
  .mcard.st-idle   { border-left-color: var(--border-bright); }
  .mcard.st-behind  { border-left-color: var(--red); }
  .mcard.st-warn   { border-left-color: var(--yellow); }
  .mcard.st-ok     { border-left-color: var(--green); }
  .mcard.st-done   { border-left-color: var(--accent); background: var(--accent-dim); }

  .mcard-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .mcard-name { font-family:var(--font-mono); font-weight:700; font-size:17px; color:#c0326b; }
  .mcard-plan-badge { font-family:var(--font-mono); font-size:12px; font-weight:700; color:#cc3377; border:1px solid #cc3377; background:rgba(204,51,119,.08); border-radius:4px; padding:2px 7px; white-space:nowrap; margin-left:7px; vertical-align:middle; }
  .mcard-full { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .mcard-dday { text-align:right; }
  .mcard-dday .num { font-family:var(--font-mono); font-weight:900; font-size:22px; line-height:1; }
  .mcard-dday .date { font-size:10px; color:var(--text-dim); margin-top:2px; }

  .mcard-progress { margin-top:12px; }
  .prow { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .prow:first-child { margin-top:0; }
  .prow .plabel { font-size:11px; color:var(--text-dim); width:44px; flex-shrink:0; }
  .prow .pbar { flex:1; height:8px; background:var(--bg-card2); border-radius:5px; overflow:hidden; }
  .prow .pbar > div { height:100%; border-radius:5px; }
  .prow .pval { font-family:var(--font-mono); font-size:12px; font-weight:700; width:56px; text-align:right; flex-shrink:0; }

  .mcard-tag { display:inline-block; margin-top:11px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .tag-idle   { background:var(--bg-card2); color:var(--text-dim); }
  .tag-behind { background:var(--red-dim); color:var(--red); }
  .tag-warn   { background:var(--yellow-dim); color:var(--yellow); }
  .tag-ok     { background:var(--green-dim); color:var(--green); }
  .tag-done   { background:var(--accent-dim); color:var(--accent2); }

  .empty { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:13px; }
  .footer-note { text-align:center; font-size:11px; color:var(--text-dim); margin-top:22px; padding:0 20px; line-height:1.6; }
  .footer-note b { color:var(--accent2); }

  /* ── 특이사항 탭 */
  .note-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px 15px; margin-bottom:10px; }
  .note-card-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .note-row { background:var(--bg-card2); border-radius:8px; padding:9px 11px; margin-top:6px; }
  .note-row:first-child { margin-top:0; }
  .note-row .txt { font-size:13px; color:var(--text-secondary); line-height:1.5; white-space:pre-wrap; }
  .note-row .meta { display:flex; justify-content:space-between; align-items:center; margin-top:5px; }
  .note-status { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .note-status.s-progress { background:var(--yellow-dim); color:var(--yellow); }
  .note-status.s-hold     { background:var(--bg-card2); color:var(--text-dim); border:1px solid var(--border); }
  .note-status.s-done     { background:var(--green-dim); color:var(--green); }
  .note-status.s-urgent   { background:var(--red-dim); color:var(--red); }
  .note-date { font-size:10px; color:var(--text-dim); font-family:var(--font-mono); }
  .note-stats { display:flex; gap:6px; margin:8px 0 10px; }
  .note-stat { flex:1; background:var(--bg-card2); border-radius:8px; padding:6px 4px; text-align:center; }
  .note-stat .v { font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--text-primary); }
  .note-stat .k { font-size:9px; color:var(--text-dim); margin-top:1px; }
  .note-stat.defect .v { color:var(--red); }

  /* ── 근무일 확인 캘린더 */
  .wd-cal-head { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:10px; }
  .wd-cal-head button { background:var(--bg-card2); border:1px solid var(--border); width:28px; height:28px; border-radius:8px; font-size:14px; font-weight:700; color:var(--text-secondary); }
  .wd-cal-head .lbl { font-family:var(--font-mono); font-weight:700; font-size:14px; color:var(--accent2); min-width:80px; text-align:center; }
  .wd-count { text-align:center; font-size:12px; color:var(--text-dim); margin-bottom:10px; }
  .wd-count b { color:var(--accent2); font-family:var(--font-mono); }
  .wd-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .wd-dow { text-align:center; font-size:10px; color:var(--text-dim); font-weight:700; padding-bottom:4px; }
  .wd-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; border-radius:6px; color:var(--text-dim); }
  .wd-cell.work { background:var(--green-dim); color:var(--green); font-weight:700; }
  .wd-cell.today { border:1.5px solid var(--accent); font-weight:700; }
  .wd-cell.empty { visibility:hidden; }

  /* ── 실적 탭 */
  .month-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin:14px 16px; }
  .month-nav button { background:var(--bg-card); border:1px solid var(--border); width:36px; height:36px; border-radius:10px; font-size:16px; font-weight:700; color:var(--text-secondary); }
  .month-nav .label { font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--accent2); min-width:110px; text-align:center; }
  .perf-summary { display:flex; gap:8px; margin:0 16px 14px; }
  .perf-chip { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:12px 6px; text-align:center; }
  .perf-chip .n { font-family:var(--font-mono); font-size:19px; font-weight:700; }
  .perf-chip .l { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .perf-item { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .perf-item-top { display:flex; justify-content:space-between; align-items:baseline; }
  .perf-item-name { font-family:var(--font-mono); font-weight:700; font-size:15px; color:#c0326b; }
  .perf-item-rate { font-family:var(--font-mono); font-weight:900; font-size:15px; }
  .perf-item-bar { height:7px; background:var(--bg-card2); border-radius:5px; overflow:hidden; margin-top:8px; }
  .perf-item-bar > div { height:100%; border-radius:5px; }
  .perf-item-nums { font-size:11px; color:var(--text-dim); margin-top:5px; font-family:var(--font-mono); }

  /* ── 하단 탭바 */
  .bottombar {
    position: fixed; bottom:0; left:0; right:0; z-index:30;
    background:#fff; border-top:1px solid var(--border);
    display:flex; padding-bottom: env(safe-area-inset-bottom);
  }
  .bt-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 0 8px; color:var(--text-dim); }
  .bt-btn .ic { font-size:19px; }
  .bt-btn .lb { font-size:10px; font-weight:700; }
  .bt-btn.active { color:var(--accent); }

  .tabpanel { display:none; }
  .tabpanel.active { display:block; }

  /* ── 공정별 상세 바텀시트 */
  .sheet-overlay { display:none; position:fixed; inset:0; background:rgba(13,24,33,.55); z-index:50; }
  .sheet-overlay.open { display:block; }
  .sheet-box {
    position:absolute; left:0; right:0; bottom:0; max-height:82vh;
    background:#fff; border-radius:18px 18px 0 0; padding:16px 16px calc(16px + env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  .sheet-handle { width:36px; height:4px; background:var(--border); border-radius:3px; margin:0 auto 12px; }
  .sheet-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .sheet-title { font-family:var(--font-mono); font-weight:700; font-size:16px; color:var(--text-primary); }
  .sheet-close { background:var(--bg-card2); border:none; width:28px; height:28px; border-radius:8px; color:var(--text-dim); font-size:15px; }
  .detail-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--bg-card2); }
  .detail-row.na { color:var(--text-dim); font-size:13px; justify-content:space-between; }
  .detail-label { font-size:12px; color:var(--text-dim); width:74px; flex-shrink:0; }
  .detail-bar { flex:1; height:8px; background:var(--bg-card2); border-radius:5px; overflow:hidden; }
  .detail-bar > div { height:100%; border-radius:5px; }
  .detail-val { font-family:var(--font-mono); font-size:12px; font-weight:700; width:52px; text-align:right; flex-shrink:0; }
  .detail-section-label { font-size:12px; font-weight:700; color:var(--text-dim); margin-bottom:6px; letter-spacing:.3px; }

  /* ── 이미지 목록 / 뷰어 */
  .img-list-row { display:flex; align-items:center; justify-content:space-between; padding:10px 2px; border-bottom:1px solid var(--bg-card2); font-size:13px; color:var(--text-secondary); }
  .img-list-row:last-child { border-bottom:none; }
  .sheet-box img.viewer-img { width:100%; border-radius:10px; margin-top:6px; }

  /* ── 결품리스트 */
  .shortage-info { font-size:11px; color:var(--text-dim); margin-bottom:8px; }
  .shortage-card { background:var(--bg-card2); border-radius:8px; padding:0; margin-top:6px; display:flex; overflow:hidden; }
  .shortage-card:first-child { margin-top:0; }
  .shortage-line {
    flex-shrink:0; width:64px; display:flex; align-items:center; justify-content:center; text-align:center;
    background:var(--accent-dim); border-right:1px solid var(--border);
    font-size:12px; font-weight:700; color:var(--accent2); padding:8px 4px; word-break:break-word;
  }
  .shortage-main { flex:1; padding:9px 11px; min-width:0; }
  .shortage-card .comp { font-size:13px; font-weight:700; color:var(--text-primary); }
  .shortage-card .order { font-size:11px; color:var(--text-dim); margin-top:1px; }
  .shortage-card .row2 { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-top:3px; }
  .shortage-card .qty { font-family:var(--font-mono); font-weight:700; color:var(--red); }
  .shortage-card .note { font-size:11px; color:var(--text-secondary); margin-top:3px; }

  /* ── 히스토리 카드 */
  .hist-chipbar { display:flex; gap:6px; padding:10px 16px 0; flex-wrap:wrap; }
  .hist-chip { padding:6px 12px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg-card); font-size:12px; font-weight:700; color:var(--text-dim); }
  .hist-chip.active { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .hist-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .hist-top { display:flex; justify-content:space-between; align-items:baseline; }
  .hist-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; background:var(--accent-dim); color:var(--accent2); }
  .hist-badge.fail { background:var(--red-dim); color:var(--red); }
  .hist-nums { font-size:12px; color:var(--text-dim); margin-top:6px; font-family:var(--font-mono); }
</style>
</head>
<body>

<script>
// ⚠ 테스트용 구글시트 주소 (운영 전환 시 이 값만 바꾸면 됨)
const GS_URL = 'https://script.google.com/macros/s/AKfycbwD0k2Qu4udUQCuRqrkiwL1nC3H7lJOsKdXFnHMq87Z53zbZUpCENHdiuPj8g3oPgpD/exec';

let allModels = [];
let allHistory = [];
let procSets = {};
let customWorkdays = new Set();
let currentSeg = 'all';
let currentTab = 'status';
let noticeOpen = false;
let perfYear = new Date().getFullYear();
let perfMonth = new Date().getMonth() + 1;
let perfViewMode = 'month'; // 'month' | 'year'

function pad(n){ return String(n).padStart(2,'0'); }

function parseLocalDate(s) {
  const clean = String(s||'').replace(/^'+/,'').split('T')[0];
  const [y,m,d] = clean.split('-').map(Number);
  return new Date(y, (m||1)-1, d||1);
}

function dateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function isCustomWorkday(d) { return customWorkdays.has(dateKey(d)); }

// PC버전과 동일하게 "근무일 수" 기준으로 D-day 계산 (달력일 아님)
function calcDday(shipDate) {
  if (!shipDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const ship = parseLocalDate(shipDate); ship.setHours(0,0,0,0);
  if (isNaN(ship)) return null;
  if (ship.getTime() === today.getTime()) return 0;
  const dir = ship > today ? 1 : -1;
  let count = 0;
  let cur = new Date(today);
  while (cur.getTime() !== ship.getTime()) {
    cur.setDate(cur.getDate() + dir);
    if (isCustomWorkday(cur)) count++;
  }
  return dir * count || dir;
}

function getDdayInfo(shipDate) {
  const d = calcDday(shipDate);
  if (d === null) return { text:'미설정', color:'var(--text-dim)' };
  if (d > 0)  return { text:'D-'+d, color: d<=5?'var(--pink)':d<=10?'var(--yellow)':'var(--green)' };
  if (d === 0) return { text:'D-DAY', color:'var(--red)' };
  return { text:'D+'+Math.abs(d), color:'var(--red)' };
}

function escapeHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function calcCkdCompletedSites(m, procSetArr) {
  const siteCount = m.plan || 0;
  let completed = siteCount > 0 ? Infinity : 0;
  (procSetArr||[]).forEach(p => {
    if (m.excludedProcs && m.excludedProcs.includes(p.id)) return;
    const need = p.crateQty || 1;
    const done = (m.procs && m.procs[p.id]) || 0;
    completed = Math.min(completed, Math.floor(done/need));
  });
  if (!isFinite(completed)) completed = 0;
  return Math.min(completed, siteCount);
}

function calcActualQty(m) {
  const isCkd = m.procSet && m.procSet.indexOf('CKD') === 0;
  if (isCkd) return { qty: calcCkdCompletedSites(m, (procSets&&procSets[m.procSet])||[]), unit:'Site' };
  return { qty: (m.procs && m.procs['pack']) || 0, unit:'대' };
}

function statusOf(pct) {
  if (pct >= 100) return { cls:'done', label:'완료' };
  if (pct <= 0)   return { cls:'idle', label:'미시작' };
  if (pct < 30)   return { cls:'behind', label:'지연' };
  if (pct < 70)   return { cls:'warn', label:'진행중' };
  return { cls:'ok', label:'순조' };
}

// ══════════ 하단 탭 전환 ══════════
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.bt-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tabpanel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'notes') renderNotesTab();
  if (tab === 'perf') renderPerfTab();
  if (tab === 'history') renderHistoryTab();
  if (tab === 'shortage') renderShortageTab();
}

// ══════════ 탭1: 현황 ══════════
function renderNotice(notice) {
  const body = document.getElementById('noticeBody');
  const plan = notice?.plan || '', issue = notice?.issue || '', memo = notice?.memo || '';
  if (!plan && !issue && !memo) {
    body.innerHTML = '<div class="notice-item" style="color:var(--text-dim)">등록된 공지가 없습니다.</div>';
    return;
  }
  body.innerHTML = `
    ${plan  ? `<div class="notice-item"><span class="lbl">📋 금일 작업 계획</span>${plan}</div>` : ''}
    ${issue ? `<div class="notice-item"><span class="lbl">⚠ 특이사항</span>${issue}</div>` : ''}
    ${memo  ? `<div class="notice-item"><span class="lbl">📝 공정별 메모</span>${memo}</div>` : ''}
  `;
}

function toggleNotice() {
  noticeOpen = !noticeOpen;
  document.getElementById('noticeToggle').classList.toggle('open', noticeOpen);
  document.getElementById('noticeBody').classList.toggle('open', noticeOpen);
}

let wdOpen = false;
let wdViewYear = new Date().getFullYear();
let wdViewMonth = new Date().getMonth(); // 0-indexed

function toggleWd() {
  wdOpen = !wdOpen;
  document.getElementById('wdToggle').classList.toggle('open', wdOpen);
  document.getElementById('wdBody').classList.toggle('open', wdOpen);
  if (wdOpen) renderWdCalendar();
}

function changeWdMonth(delta) {
  wdViewMonth += delta;
  if (wdViewMonth > 11) { wdViewMonth = 0; wdViewYear++; }
  if (wdViewMonth < 0)  { wdViewMonth = 11; wdViewYear--; }
  renderWdCalendar();
}

function renderWdCalendar() {
  const body = document.getElementById('wdBody');
  const y = wdViewYear, m = wdViewMonth;
  const firstDow = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const dows = ['일','월','화','수','목','금','토'];

  let workCount = 0;
  let cells = '';
  for (let i = 0; i < firstDow; i++) cells += '<div class="wd-cell empty"></div>';
  for (let d = 1; d <= lastDate; d++) {
    const key = `${y}-${pad(m+1)}-${pad(d)}`;
    const isWork = customWorkdays.has(key);
    if (isWork) workCount++;
    const cur = new Date(y, m, d); cur.setHours(0,0,0,0);
    const isToday = cur.getTime() === today.getTime();
    cells += `<div class="wd-cell ${isWork?'work':''} ${isToday?'today':''}">${d}</div>`;
  }

  body.innerHTML = `
    <div class="wd-cal-head">
      <button onclick="changeWdMonth(-1)">‹</button>
      <div class="lbl">${y}년 ${m+1}월</div>
      <button onclick="changeWdMonth(1)">›</button>
    </div>
    <div class="wd-count">이번 화면 기준 근무일 <b>${workCount}일</b></div>
    <div class="wd-grid">
      ${dows.map(w => `<div class="wd-dow">${w}</div>`).join('')}
      ${cells}
    </div>
  `;
}

// ══════════ 등록 이미지 갤러리 ══════════
let imgListOpen = false;
let sharedImagesMeta = [];
let imgCache = {};

function toggleImgList() {
  imgListOpen = !imgListOpen;
  document.getElementById('imgToggle').classList.toggle('open', imgListOpen);
  document.getElementById('imgListBody').classList.toggle('open', imgListOpen);
  if (imgListOpen) renderImgList();
}

function renderImgList() {
  const body = document.getElementById('imgListBody');
  if (!sharedImagesMeta || sharedImagesMeta.length === 0) {
    body.innerHTML = '<div class="notice-item" style="color:var(--text-dim)">등록된 이미지가 없습니다.</div>';
    return;
  }
  body.innerHTML = sharedImagesMeta.map(img => `
    <div class="img-list-row" onclick="openImageView('${img.id}')">
      <span>🖼 ${escapeHtml(img.title)}</span>
      <span style="color:var(--text-dim);">›</span>
    </div>
  `).join('');
}

async function openImageView(id) {
  const meta = (sharedImagesMeta||[]).find(m => m.id === id);
  document.getElementById('imageViewTitle').textContent = meta ? meta.title : '이미지';
  const body = document.getElementById('imageViewBody');
  document.getElementById('imageViewOverlay').classList.add('open');

  const descHtml = (meta && meta.desc) ? `<div style="font-size:13px;color:var(--text-secondary);margin-top:8px;text-align:left;">${escapeHtml(meta.desc)}</div>` : '';

  if (imgCache[id]) {
    body.innerHTML = `<img class="viewer-img" src="${imgCache[id]}">${descHtml}`;
    return;
  }
  body.innerHTML = '<div style="padding:20px;">불러오는 중...</div>';
  try {
    const res = await fetch(GS_URL + '?action=load_shared_image&id=' + encodeURIComponent(id));
    const json = await res.json();
    if (json.status !== 'ok' || !json.data || !json.data.imageData) throw new Error('불러오기 실패');
    imgCache[id] = json.data.imageData;
    body.innerHTML = `<img class="viewer-img" src="${json.data.imageData}">${descHtml}`;
  } catch (e) {
    console.error(e);
    body.innerHTML = '<div style="padding:20px;color:var(--red);">이미지를 불러오지 못했습니다.</div>';
  }
}

function closeImageView() {
  document.getElementById('imageViewOverlay').classList.remove('open');
}

// ══════════ 탭5: 결품리스트 (정렬 가능) ══════════
let shortageData = { items: [] };
const SHORTAGE_COLS = [
  { key:'line',  label:'LINE',  type:'text' },
  { key:'order', label:'Order', type:'text' },
  { key:'comp',  label:'Comp.', type:'text' },
  { key:'desc',  label:'Desc.', type:'text' },
  { key:'qty',   label:'Qty.',  type:'num'  },
  { key:'date',  label:'Date',  type:'text' },
];
let shortageSort = { col: null, dir: 'asc' };

function setShortageSort(col) {
  if (shortageSort.col === col) {
    shortageSort.dir = shortageSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    shortageSort = { col, dir: 'asc' };
  }
  renderShortageTab();
}

function renderShortageTab() {
  const infoEl = document.getElementById('shortageInfo');
  const items = ((shortageData && shortageData.items) || []).slice();

  if (shortageData.fileName) {
    const dt = shortageData.uploadedAt ? new Date(shortageData.uploadedAt).toLocaleString('ko-KR') : '';
    infoEl.innerHTML = `<div class="shortage-info"><b>${escapeHtml(shortageData.fileName)}</b> · ${items.length}건 · ${escapeHtml(shortageData.uploadedBy||'익명')} 업로드 · ${dt}</div>`;
  } else {
    infoEl.innerHTML = '<div class="shortage-info">업로드된 결품리스트가 없습니다.</div>';
  }

  document.getElementById('shortageSortBar').innerHTML = SHORTAGE_COLS.map(col => {
    const active = shortageSort.col === col.key;
    const arrow = active ? (shortageSort.dir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<button class="hist-chip ${active?'active':''}" onclick="setShortageSort('${col.key}')">${col.label}${arrow}</button>`;
  }).join('');

  if (shortageSort.col) {
    const { col, dir } = shortageSort;
    const colDef = SHORTAGE_COLS.find(c => c.key === col);
    items.sort((a,b) => {
      let av = a[col], bv = b[col];
      if (colDef.type === 'num') { av = parseFloat(av)||0; bv = parseFloat(bv)||0; }
      else { av = String(av||''); bv = String(bv||''); }
      const cmp = av > bv ? 1 : av < bv ? -1 : 0;
      return dir === 'asc' ? cmp : -cmp;
    });
  }

  const content = document.getElementById('shortageContent');
  if (items.length === 0) {
    content.innerHTML = '<div class="empty">등록된 결품리스트가 없습니다.</div>';
    return;
  }
  content.innerHTML = items.map(it => `
    <div class="shortage-card">
      <div class="shortage-line">${escapeHtml(it.line || '-')}</div>
      <div class="shortage-main">
        <div class="row2" style="margin-top:0;">
          <span class="comp">${escapeHtml(it.comp || '(부품명 없음)')}</span>
          <span class="qty">${escapeHtml(String(it.qty||0))}</span>
        </div>
        <div class="order">${escapeHtml(it.order||'')}</div>
        <div class="row2"><span>${escapeHtml(it.desc||'')}</span><span>${escapeHtml(it.date||'')}</span></div>
        ${it.note ? `<div class="note">📝 ${escapeHtml(it.note)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ══════════ 탭4: 완료 히스토리 ══════════
let histCategory = 'all';
let histMonth = 0;

function setHistCategory(c) { histCategory = c; renderHistoryTab(); }
function setHistMonth(m) { histMonth = m; renderHistoryTab(); }

function renderHistoryTab() {
  const catBar = document.getElementById('histCatBar');
  catBar.innerHTML = [['all','전체'],['ant','ANT'],['ckd','CKD']].map(([c,label]) =>
    `<button class="hist-chip ${histCategory===c?'active':''}" onclick="setHistCategory('${c}')">${label}</button>`
  ).join('');

  let filtered = allHistory.filter(h => {
    if (histCategory === 'all') return true;
    const isCkd = h.procSet && h.procSet.indexOf('CKD') === 0;
    return histCategory === 'ckd' ? isCkd : !isCkd;
  });

  const months = [...new Set(filtered.map(h => getHistYearMonth(h).month).filter(Boolean))].sort((a,b) => b-a);
  document.getElementById('histMonthBar').innerHTML =
    `<button class="hist-chip ${histMonth===0?'active':''}" onclick="setHistMonth(0)">전체</button>` +
    months.map(mo => `<button class="hist-chip ${histMonth===mo?'active':''}" onclick="setHistMonth(${mo})">${mo}월</button>`).join('');

  if (histMonth !== 0) filtered = filtered.filter(h => getHistYearMonth(h).month === histMonth);
  filtered = filtered.slice().sort((a,b) => new Date(b.completedAt||0) - new Date(a.completedAt||0));
  _renderedHistory = filtered;

  const content = document.getElementById('historyContent');
  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty">완료 처리된 모델이 없습니다.</div>';
    return;
  }
  content.innerHTML = filtered.map((h,i) => {
    const { qty, unit } = calcActualQty(h);
    const rate = h.plan > 0 ? Math.round(qty/h.plan*100) : 0;
    return `
      <div class="hist-card" onclick="openProcDetail('history', ${i})">
        <div class="hist-top">
          <span class="mcard-name" style="font-size:14px;">${escapeHtml(h.model)}</span>
          <span class="hist-badge ${rate<100?'fail':''}">${rate>=100?'✔ 완료':'⚠ 미달성'}</span>
        </div>
        ${h.fullName ? `<div class="mcard-full">${escapeHtml(h.fullName)}</div>` : ''}
        <div class="hist-nums">계획 ${h.plan}${unit} · 실적 ${qty}${unit} (${rate}%) · 완료일 ${escapeHtml(h.completedDate||'-')}</div>
      </div>
    `;
  }).join('');
}

function setSeg(seg) {
  currentSeg = seg;
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.seg === seg));
  renderStatusTab();
}

function renderSummary(models) {
  const now = new Date();
  const curYear = now.getFullYear(), curMonth = now.getMonth() + 1;

  const activeAnt = models.filter(m => !(m.procSet && m.procSet.indexOf('CKD')===0));
  const histAntThisMonth = allHistory.filter(h => {
    if (h.procSet && h.procSet.indexOf('CKD')===0) return false;
    const ym = getHistYearMonth(h);
    return ym.year === curYear && ym.month === curMonth;
  });

  let plan=0, main=0, final=0, pack=0;
  activeAnt.forEach(m => { plan+=m.plan||0; main+=(m.procs&&m.procs['main'])||0; final+=(m.procs&&m.procs['final'])||0; pack+=(m.procs&&m.procs['pack'])||0; });
  histAntThisMonth.forEach(h => { plan+=h.plan||0; main+=(h.procs&&h.procs['main'])||0; final+=(h.procs&&h.procs['final'])||0; pack+=(h.procs&&h.procs['pack'])||0; });

  const pct = (n) => plan>0 ? Math.round(n/plan*100) : 0;
  const row = document.getElementById('summaryRow');
  row.innerHTML = `
    <div class="summary-chip">
      <div class="l">총 계획</div>
      <div class="n">${plan}<small>대</small></div>
    </div>
    <div class="summary-chip">
      <div class="l">조립 완료</div>
      <div class="n">${main}/${plan}<small>대</small></div>
      <div class="pct" style="color:var(--green);">${pct(main)}%</div>
    </div>
    <div class="summary-chip">
      <div class="l">검사 완료</div>
      <div class="n">${final}/${plan}<small>대</small></div>
      <div class="pct" style="color:var(--yellow);">${pct(final)}%</div>
    </div>
    <div class="summary-chip">
      <div class="l">포장 완료</div>
      <div class="n">${pack}/${plan}<small>대</small></div>
      <div class="pct" style="color:var(--accent2);">${pct(pack)}%</div>
    </div>
  `;
}

function renderAntCard(m, i) {
  const plan = m.plan || 0;
  const mainDone = (m.procs && m.procs['main']) || 0;
  const packDone = (m.procs && m.procs['pack']) || 0;
  const pct = plan > 0 ? Math.round(packDone/plan*100) : 0;
  const st = statusOf(pct);
  const dday = getDdayInfo(m.shipDate);
  const mainPct = plan>0 ? Math.min(Math.round(mainDone/plan*100),100) : 0;
  const packPct = plan>0 ? Math.min(Math.round(packDone/plan*100),100) : 0;
  const noteCount = (m.noteData || []).filter(r => r.status !== 'Completed').length;

  return `
    <div class="mcard st-${st.cls}" onclick="openProcDetail('ant', ${i})">
      ${noteCount>0 ? `<div class="mcard-note-badge">📋 ${noteCount}</div>` : ''}
      <div class="mcard-top">
        <div>
          <div><span class="mcard-name">${escapeHtml(m.model)}</span><span class="mcard-plan-badge">${plan}대</span></div>
          ${m.fullName ? `<div class="mcard-full">${escapeHtml(m.fullName)}</div>` : ''}
        </div>
        <div class="mcard-dday">
          <div class="num" style="color:${dday.color}">${dday.text}</div>
          <div class="date">${m.shipDate || '-'}</div>
        </div>
      </div>
      <div class="mcard-progress">
        <div class="prow">
          <div class="plabel">조립</div>
          <div class="pbar"><div style="width:${mainPct}%;background:var(--accent);"></div></div>
          <div class="pval">${mainDone}/${plan}</div>
        </div>
        <div class="prow">
          <div class="plabel">포장</div>
          <div class="pbar"><div style="width:${packPct}%;background:${pct>=100?'var(--accent)':'var(--green)'};"></div></div>
          <div class="pval">${packDone}/${plan}</div>
        </div>
      </div>
      <span class="mcard-tag tag-${st.cls}">${st.label} · ${pct}%</span>

}

function renderCkdCard(m, i) {
  const procArr = (procSets && procSets[m.procSet]) || [];
  const siteCount = m.plan || 0;
  const completed = calcCkdCompletedSites(m, procArr);
  const pct = siteCount>0 ? Math.round(completed/siteCount*100) : 0;
  const st = statusOf(pct);
  const dday = getDdayInfo(m.shipDate);
  const noteCount = (m.noteData || []).filter(r => r.status !== 'Completed').length;

  return `
    <div class="mcard st-${st.cls}" onclick="openProcDetail('ckd', ${i})">
      ${noteCount>0 ? `<div class="mcard-note-badge">📋 ${noteCount}</div>` : ''}
      <div class="mcard-top">
        <div>
          <div><span class="mcard-name">${escapeHtml(m.model)}</span><span class="mcard-plan-badge">${siteCount} Site</span></div>
          ${m.fullName ? `<div class="mcard-full">${escapeHtml(m.fullName)}</div>` : ''}
        </div>
        <div class="mcard-dday">
          <div class="num" style="color:${dday.color}">${dday.text}</div>
          <div class="date">${m.shipDate || '-'}</div>
        </div>
      </div>
      <div class="mcard-progress">
        <div class="prow">
          <div class="plabel">포장</div>
          <div class="pbar"><div style="width:${pct}%;background:${pct>=100?'var(--accent)':'var(--green)'};"></div></div>
          <div class="pval">${completed}/${siteCount} Site</div>
        </div>
      </div>
      <span class="mcard-tag tag-${st.cls}">${st.label} · ${pct}%</span>
    </div>
  `;
}

let _renderedAnt = [], _renderedCkd = [], _renderedHistory = [];
let monthlyRemarks = {};

function openProcDetail(source, i) {
  const m = source === 'ant' ? _renderedAnt[i] : source === 'ckd' ? _renderedCkd[i] : _renderedHistory[i];
  if (!m) return;
  const procArr = (procSets && procSets[m.procSet]) || [];
  const isCkd = m.procSet && m.procSet.indexOf('CKD') === 0;

  document.getElementById('detailSheetTitle').textContent = m.model + (m.fullName ? ' · ' + m.fullName : '');

  let html = '';

  // 특이사항 (완료된 모델도 완료 당시 기록이 그대로 남아있어 히스토리에서도 조회 가능)
  if (m.noteData && m.noteData.length > 0) {
    html += '<div class="detail-section-label">📋 특이사항</div>';
    html += m.noteData.map(r => `
      <div class="note-row" style="margin-top:6px;">
        <div class="txt">${r.issue || r.text || '(내용 없음)'}</div>
        ${r.remarks ? `<div class="txt" style="color:var(--text-dim);font-size:12px;margin-top:3px;">${r.remarks}</div>` : ''}
        <div class="meta">
          <span class="note-status ${noteStatusClass(r.status)}">${escapeHtml(r.status || '진행중')}</span>
          <span class="note-date">${escapeHtml(r.lastUpdated || '')}${r.defectQty ? ' · 문제수량 '+escapeHtml(String(r.defectQty)) : ''}</span>
        </div>
      </div>
    `).join('');
    html += '<div class="detail-section-label" style="margin-top:14px;">⚙ 공정별 현황</div>';
  }

  if (procArr.length === 0) {
    html += '<div class="empty">공정 세트 정보를 찾을 수 없습니다.</div>';
  } else {
    html += procArr.map(p => {
      const isExcluded = m.excludedProcs && m.excludedProcs.includes(p.id);
      if (isExcluded) {
        return `<div class="detail-row na"><span>${escapeHtml(p.short)}</span><span>N/A</span></div>`;
      }
      const done = (m.procs && m.procs[p.id]) || 0;
      const wip  = (m.wip && m.wip[p.id]) || 0;
      const planQty = isCkd ? ((m.procPlan && m.procPlan[p.id]) || 0) : (m.plan || 0);
      const pct = planQty > 0 ? Math.round(done / planQty * 100) : 0;
      const issue = (m.issues && m.issues[p.id]) || '';
      return `
        <div class="detail-row" style="flex-wrap:wrap;">
          <div class="detail-label">${escapeHtml(p.short)}</div>
          <div class="detail-bar"><div style="width:${Math.min(pct,100)}%;background:${pct>=100?'var(--accent)':'var(--green)'};"></div></div>
          <div class="detail-val">${done}${wip>0?`<span style="color:var(--yellow);">+${wip}</span>`:''}/${planQty} (${pct}%)</div>
          ${issue ? `<div style="flex-basis:100%;font-size:11px;color:var(--red);margin-top:4px;">⚠ ${escapeHtml(issue)}</div>` : ''}
        </div>`;
    }).join('');
  }

  document.getElementById('detailSheetBody').innerHTML = html;
  document.getElementById('detailSheetOverlay').classList.add('open');
}

function closeDetailSheet() {
  document.getElementById('detailSheetOverlay').classList.remove('open');
}

function renderStatusTab() {
  const main = document.getElementById('mainContent');
  const ant = allModels.filter(m => !(m.procSet && m.procSet.indexOf('CKD')===0));
  const ckd = allModels.filter(m => m.procSet && m.procSet.indexOf('CKD')===0);

  if (allModels.length === 0) {
    main.innerHTML = '<div class="empty">등록된 모델이 없습니다.</div>';
    return;
  }

  let html = '';
  if (currentSeg === 'all' || currentSeg === 'ant') {
    if (ant.length > 0) {
      html += '<div class="section-label">ANT 생산현황</div><div class="cards">';
      ant.sort((a,b) => (calcDday(a.shipDate)??999) - (calcDday(b.shipDate)??999));
      _renderedAnt = ant;
      ant.forEach((m,i) => html += renderAntCard(m,i));
      html += '</div>';
    }
  }
  if (currentSeg === 'all' || currentSeg === 'ckd') {
    if (ckd.length > 0) {
      html += '<div class="section-label">CKD (미국공장 포장출하)</div>';
      html += renderCkdSummary();
      html += '<div class="cards">';
      ckd.sort((a,b) => (calcDday(a.shipDate)??999) - (calcDday(b.shipDate)??999));
      _renderedCkd = ckd;
      ckd.forEach((m,i) => html += renderCkdCard(m,i));
      html += '</div>';
    }
  }
  if (!html) html = '<div class="empty">해당 카테고리에 표시할 모델이 없습니다.</div>';
  main.innerHTML = html;
}

// CKD 요약 (총계획/포장완료, Site 단위) - PC 메인화면과 동일 기준(당월 전체 = 진행중 + 이번달 완료분)
function renderCkdSummary() {
  const ckdActive = allModels.filter(m => m.procSet && m.procSet.indexOf('CKD') === 0);
  let plan = 0, done = 0;
  ckdActive.forEach(m => {
    plan += m.plan || 0;
    done += calcCkdCompletedSites(m, (procSets && procSets[m.procSet]) || []);
  });
  const now = new Date();
  const curYear = now.getFullYear(), curMonth = now.getMonth() + 1;
  allHistory.forEach(h => {
    if (!(h.procSet && h.procSet.indexOf('CKD') === 0)) return;
    const ym = getHistYearMonth(h);
    if (ym.year !== curYear || ym.month !== curMonth) return;
    plan += h.plan || 0;
    done += calcCkdCompletedSites(h, (procSets && procSets[h.procSet]) || []);
  });
  const pct = plan > 0 ? Math.round(done / plan * 100) : 0;
  return `
    <div class="summary-row" style="margin-top:0;margin-bottom:12px;">
      <div class="summary-chip"><div class="l">총 계획</div><div class="n">${plan}<small>Site</small></div></div>
      <div class="summary-chip"><div class="l">포장 완료</div><div class="n">${done}/${plan}<small>Site</small></div><div class="pct" style="color:var(--accent2);">${pct}%</div></div>
    </div>
  `;
}

// ══════════ 탭2: 특이사항 모아보기 ══════════
function noteStatusClass(status) {
  if (!status) return 's-progress';
  const s = String(status).toLowerCase();
  if (s.includes('완료') || s.includes('done') || s.includes('complete')) return 's-done';
  if (s.includes('보류') || s.includes('hold')) return 's-hold';
  if (s.includes('긴급') || s.includes('urgent')) return 's-urgent';
  return 's-progress';
}

function renderNotesTab() {
  const wrap = document.getElementById('notesContent');
  const withNotes = allModels.filter(m => m.noteData && m.noteData.length > 0);

  withNotes.sort((a, b) => {
    const aCkd = a.procSet && a.procSet.indexOf('CKD') === 0;
    const bCkd = b.procSet && b.procSet.indexOf('CKD') === 0;
    if (aCkd !== bCkd) return aCkd ? 1 : -1;
    const da = a.shipDate ? (calcDday(a.shipDate) ?? Infinity) : Infinity;
    const db = b.shipDate ? (calcDday(b.shipDate) ?? Infinity) : Infinity;
    return da - db;
  });

  if (withNotes.length === 0) {
    wrap.innerHTML = '<div class="empty">등록된 특이사항이 없습니다.</div>';
    return;
  }

  wrap.innerHTML = withNotes.map(m => {
    const dday = getDdayInfo(m.shipDate);
    const isCkd = m.procSet && m.procSet.indexOf('CKD') === 0;
    const defectQty = m.noteData.reduce((s,r) => s + (parseInt(r.defectQty)||0), 0);

    let statsHtml;
    if (isCkd) {
      const procArr = (procSets && procSets[m.procSet]) || [];
      const completed = calcCkdCompletedSites(m, procArr);
      statsHtml = `
        <div class="note-stats">
          <div class="note-stat"><div class="v">${m.plan||0} Site</div><div class="k">계획</div></div>
          <div class="note-stat"><div class="v">${completed} Site</div><div class="k">포장완료</div></div>
          <div class="note-stat defect"><div class="v">${defectQty}</div><div class="k">문제수량</div></div>
        </div>`;
    } else {
      const mainDone = (m.procs && m.procs['main']) || 0;
      const packDone = (m.procs && m.procs['pack']) || 0;
      statsHtml = `
        <div class="note-stats">
          <div class="note-stat"><div class="v">${m.plan||0}대</div><div class="k">계획</div></div>
          <div class="note-stat"><div class="v">${mainDone}대</div><div class="k">조립완료</div></div>
          <div class="note-stat"><div class="v">${packDone}대</div><div class="k">포장완료</div></div>
          <div class="note-stat defect"><div class="v">${defectQty}대</div><div class="k">문제수량</div></div>
        </div>`;
    }

    const rows = m.noteData.map(r => `
      <div class="note-row">
        <div class="txt">${r.issue || r.text || '(내용 없음)'}</div>
        ${r.remarks ? `<div class="txt" style="color:var(--text-dim);font-size:12px;margin-top:3px;">${r.remarks}</div>` : ''}
        <div class="meta">
          <span class="note-status ${noteStatusClass(r.status)}">${escapeHtml(r.status || '진행중')}</span>
          <span class="note-date">${escapeHtml(r.lastUpdated || '')}</span>
        </div>
      </div>
    `).join('');

    return `
      <div class="note-card">
        <div class="note-card-head">
          <div>
            <span class="mcard-name" style="font-size:15px;">${escapeHtml(m.model)}</span>
            ${m.fullName ? `<div class="mcard-full">${escapeHtml(m.fullName)}</div>` : ''}
          </div>
          <span style="font-family:var(--font-mono);font-weight:900;font-size:15px;color:${dday.color};">${dday.text}</span>
        </div>
        ${statsHtml}
        ${rows}
      </div>
    `;
  }).join('');
}

// ══════════ 탭3: 계획대비실적 ══════════
function getHistYearMonth(h) {
  if (h.shipYear && h.shipMonth) return { year: h.shipYear, month: h.shipMonth };
  const sd = h.shipDate ? parseLocalDate(h.shipDate) : null;
  if (sd && !isNaN(sd)) return { year: sd.getFullYear(), month: sd.getMonth() + 1 };
  const cd = h.completedAt ? new Date(h.completedAt) : null;
  if (cd && !isNaN(cd)) return { year: cd.getFullYear(), month: cd.getMonth() + 1 };
  return { year: null, month: null };
}

function changePerfMonth(delta) {
  perfMonth += delta;
  while (perfMonth > 12) { perfMonth -= 12; perfYear += 1; }
  while (perfMonth < 1)  { perfMonth += 12; perfYear -= 1; }
  renderPerfTab();
}

function setPerfViewMode(mode) {
  perfViewMode = mode;
  document.getElementById('perfModeMonthBtn').classList.toggle('active', mode === 'month');
  document.getElementById('perfModeYearBtn').classList.toggle('active', mode === 'year');
  renderPerfTab();
}
function perfNavPrev() { perfViewMode === 'month' ? changePerfMonth(-1) : changePerfYear(-1); }
function perfNavNext() { perfViewMode === 'month' ? changePerfMonth(1)  : changePerfYear(1); }
function changePerfYear(delta) { perfYear += delta; renderPerfTab(); }

// PC와 동일 로직: month가 null이면 그 해 전체(연도별) 합산, ANT/CKD 완전 분리
function computePerf(year, month) {
  const antGroups = {}, ckdGroups = {};
  function addToGroup(groups, m, actual, unit) {
    const key = m.model || '(모델명 없음)';
    if (!groups[key]) groups[key] = { plan: 0, actual: 0, unit };
    groups[key].plan += (m.plan || 0);
    groups[key].actual += actual;
  }
  function ymMatches(y, m) {
    if (month === null) return y === year;
    return y === year && m === month;
  }
  allHistory.forEach(h => {
    const ym = getHistYearMonth(h);
    if (!ymMatches(ym.year, ym.month)) return;
    const isCkd = h.procSet && h.procSet.indexOf('CKD') === 0;
    const { qty, unit } = calcActualQty(h);
    addToGroup(isCkd ? ckdGroups : antGroups, h, qty, unit);
  });
  allModels.forEach(m => {
    if (!m.shipDate) return;
    const sd = parseLocalDate(m.shipDate);
    if (isNaN(sd)) return;
    if (!ymMatches(sd.getFullYear(), sd.getMonth() + 1)) return;
    const isCkd = m.procSet && m.procSet.indexOf('CKD') === 0;
    const { qty, unit } = calcActualQty(m);
    addToGroup(isCkd ? ckdGroups : antGroups, m, qty, unit);
  });
  return { ant: antGroups, ckd: ckdGroups };
}

function renderPerfTab() {
  document.getElementById('perfMonthLabel').textContent = perfViewMode === 'month' ? `${perfYear}년 ${perfMonth}월` : `${perfYear}년`;

  const monthArg = perfViewMode === 'month' ? perfMonth : null;
  const { ant: antGroups, ckd: ckdGroups } = computePerf(perfYear, monthArg);

  const content = document.getElementById('perfContent');
  content.innerHTML = buildPerfSection('🛰 ANT', antGroups, true, '_renderedPerfKeysAnt')
                     + buildPerfSection('📦 CKD', ckdGroups, false, '_renderedPerfKeysCkd');
}

function buildPerfSection(title, groups, showRemark, storeVarName) {
  const keys = Object.keys(groups).sort();
  window[storeVarName] = keys;
  let totalPlan = 0, totalActual = 0;
  keys.forEach(k => { totalPlan += groups[k].plan; totalActual += groups[k].actual; });
  const totalRate = totalPlan > 0 ? Math.round(totalActual/totalPlan*100) : 0;
  const unit = keys.length > 0 ? groups[keys[0]].unit : (title.indexOf('CKD') >= 0 ? 'Site' : '대');

  let html = `<div class="section-label" style="margin-top:16px;">${title}</div>`;
  html += `
    <div class="perf-summary">
      <div class="perf-chip"><div class="n">${totalPlan}<small style="font-size:11px;">${unit}</small></div><div class="l">총 계획</div></div>
      <div class="perf-chip"><div class="n" style="color:var(--accent2);">${totalActual}<small style="font-size:11px;">${unit}</small></div><div class="l">총 실적</div></div>
      <div class="perf-chip"><div class="n" style="color:${totalRate>=100?'var(--green)':totalRate>=70?'var(--yellow)':'var(--red)'};">${totalRate}%</div><div class="l">달성률</div></div>
    </div>
  `;

  if (keys.length === 0) {
    html += `<div class="empty">해당 기간에 데이터가 없습니다.</div>`;
    return html;
  }

  const remarkKey = `${perfYear}-${pad(perfMonth)}`;
  html += keys.map((k,i) => {
    const g = groups[k];
    const rate = g.plan > 0 ? Math.round(g.actual/g.plan*100) : 0;
    const barMax = Math.max(g.plan, g.actual, 1);
    const rateColor = rate>=100?'var(--green)':rate>=70?'var(--yellow)':'var(--red)';
    const hasRemark = showRemark && !!(monthlyRemarks[remarkKey] && monthlyRemarks[remarkKey][k]);
    return `
      <div class="perf-item" ${showRemark ? `onclick="openPerfRemark(${i})"` : ''}>
        <div class="perf-item-top">
          <span class="perf-item-name">${escapeHtml(k)}</span>
          <span class="perf-item-rate" style="color:${rateColor};">${rate}%</span>
        </div>
        <div class="perf-item-bar"><div style="width:${Math.min(g.actual/barMax*100,100)}%;background:${rateColor};"></div></div>
        <div class="perf-item-nums">${g.actual} / ${g.plan} ${g.unit}${hasRemark ? ' · 📝 비고 있음' : ''}</div>
      </div>
    `;
  }).join('');
  return html;
}

function openPerfRemark(i) {
  const k = _renderedPerfKeysAnt[i];
  if (!k) return;
  const remarkKey = `${perfYear}-${pad(perfMonth)}`;
  const text = (monthlyRemarks[remarkKey] && monthlyRemarks[remarkKey][k]) || '';
  document.getElementById('detailSheetTitle').textContent = k + ' · 비고';
  document.getElementById('detailSheetBody').innerHTML = text
    ? `<div style="font-size:14px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap;padding:6px 0;">${escapeHtml(text)}</div>`
    : '<div class="empty">등록된 비고(미달성 사유)가 없습니다.</div>';
  document.getElementById('detailSheetOverlay').classList.add('open');
}

// ══════════ 데이터 로드 ══════════
async function loadData(isManual) {
  const btn = document.getElementById('refreshBtn');
  if (isManual) btn.classList.add('spin');
  try {
    const res = await fetch(GS_URL + '?action=load');
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || '불러오기 실패');
    const d = json.data;
    allModels = d.models || [];
    allHistory = d.history || [];
    procSets = d.procsets || {};
    customWorkdays = new Set(d.workdays || []);
    sharedImagesMeta = d.sharedImagesMeta || [];
    monthlyRemarks = d.remarks || {};
    shortageData = d.shortage || { items: [] };

    renderSummary(allModels);
    renderNotice(d.notice);
    renderStatusTab();
    if (wdOpen) renderWdCalendar();
    if (imgListOpen) renderImgList();
    if (currentTab === 'shortage') renderShortageTab();
    if (currentTab === 'notes') renderNotesTab();
    if (currentTab === 'perf') renderPerfTab();
    if (currentTab === 'history') renderHistoryTab();

    const now = new Date();
    document.getElementById('lastSync').textContent = `업데이트: ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  } catch (e) {
    console.error(e);
    document.getElementById('lastSync').textContent = '연결 실패 · 재시도 중...';
  } finally {
    if (isManual) setTimeout(() => btn.classList.remove('spin'), 400);
  }
}

function manualRefresh() { loadData(true); }

loadData(false);
setInterval(() => loadData(false), 30000);
</script>
